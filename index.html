<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>LCARS Weather</title>
  <meta name="theme-color" content="#000000" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #000000;
      --panel: #090909;
      --line: rgba(210, 192, 255, 0.14);
      --line-strong: rgba(210, 192, 255, 0.28);
      --text: #f3d4bf;
      --muted: #c6b4ea;
      --lcars-pink: #c88ab1;
      --lcars-lilac: #9d97f5;
      --lcars-orange: #ff9c2f;
      --lcars-apricot: #f6b88c;
      --lcars-rose: #cf6d70;
      --shadow: 0 0 0 1px rgba(255,255,255,0.03), 0 8px 28px rgba(0,0,0,0.45);
      --radius-pill: 28px;
      --radius-panel: 24px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Oswald', sans-serif;
      overflow: hidden;
      letter-spacing: 0.02em;
    }

    .app {
      height: 100dvh;
      padding: calc(12px + var(--safe-top)) 12px calc(10px + var(--safe-bottom));
      display: grid;
      grid-template-rows: 0.11fr 0.43fr 0.07fr 0.12fr 0.21fr 0.06fr;
      gap: 10px;
      background:
        radial-gradient(circle at top right, rgba(157,151,245,0.12), transparent 28%),
        radial-gradient(circle at bottom left, rgba(255,156,47,0.10), transparent 35%),
        #000;
    }

    .panel {
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      border-radius: var(--radius-panel);
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .lcars-shell {
      display: grid;
      grid-template-columns: 64px 1fr 64px;
      align-items: stretch;
      gap: 10px;
      height: 100%;
    }

    .lcars-side {
      position: relative;
      border-radius: var(--radius-pill);
      background: linear-gradient(180deg, var(--lcars-pink), #b47aa1);
      opacity: 0.9;
    }

    .lcars-side::after {
      content: '';
      position: absolute;
      inset: 10px;
      border-radius: 18px;
      border: 1px solid rgba(0,0,0,0.18);
      pointer-events: none;
    }

    .lcars-main {
      min-width: 0;
      display: flex;
      flex-direction: column;
    }

    .header {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      padding: 10px 8px;
      min-width: 0;
    }

    .location-block {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .location-pill {
      min-width: 0;
      flex: 1;
      border-radius: var(--radius-pill);
      background: linear-gradient(90deg, rgba(200,138,177,0.95), rgba(157,151,245,0.92));
      padding: 8px 16px;
      color: #10080d;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .location-name {
      font-size: clamp(1.5rem, 4vw, 2.1rem);
      line-height: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .location-button {
      border: none;
      background: rgba(0,0,0,0.18);
      color: #140b11;
      border-radius: 999px;
      padding: 7px 12px;
      font: inherit;
      cursor: pointer;
    }

    .status-box {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
      padding-left: 10px;
    }

    .clock {
      color: var(--lcars-apricot);
      font-size: clamp(1.2rem, 3vw, 1.5rem);
      line-height: 1;
    }

    .status {
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1;
      background: rgba(157,151,245,0.16);
      padding: 5px 10px;
      border-radius: 999px;
    }

    .forecast-panel {
      padding: 10px 10px 8px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 6px;
    }

    .forecast-top {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 10px;
      padding: 0 4px;
    }

    .forecast-title {
      color: var(--lcars-orange);
      font-size: 1rem;
      line-height: 1;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(255,156,47,0.12);
    }

    .model-legend {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      min-width: 0;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--text);
      font-size: 0.88rem;
      background: rgba(255,255,255,0.03);
      padding: 4px 8px;
      border-radius: 999px;
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      display: inline-block;
    }

    .forecast-canvas-wrap {
      position: relative;
      min-height: 0;
      border-radius: 18px;
      overflow: hidden;
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
      border: 1px solid rgba(255,255,255,0.04);
    }

    #forecastCanvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .forecast-meta {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      font-size: 0.88rem;
      color: var(--muted);
      padding: 0 4px;
    }

    .forecast-meta span strong {
      color: var(--lcars-apricot);
      font-weight: 500;
    }

    .sun-panel {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
    }

    .sun-chip {
      background: linear-gradient(90deg, rgba(246,184,140,0.15), rgba(255,156,47,0.12));
      border-radius: var(--radius-pill);
      padding: 8px 12px;
      color: var(--lcars-apricot);
      font-size: clamp(0.95rem, 2.7vw, 1.05rem);
      line-height: 1;
    }

    .sun-date {
      color: var(--muted);
      font-size: 0.95rem;
      text-align: center;
    }

    .favorites-panel {
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 8px;
      padding: 8px 10px 10px;
    }

    .section-title {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--lcars-lilac);
      font-size: 1rem;
      line-height: 1;
      padding: 5px 10px;
      border-radius: 999px;
      background: rgba(157,151,245,0.12);
      width: fit-content;
    }

    .favorites-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      grid-auto-rows: 1fr;
      gap: 8px;
      min-height: 0;
    }

    .favorite-card {
      border: none;
      min-width: 0;
      border-radius: 26px;
      cursor: pointer;
      font: inherit;
      text-align: left;
      color: #120910;
      background: linear-gradient(90deg, var(--lcars-orange), var(--lcars-apricot));
      padding: 8px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      transition: transform 120ms ease, filter 120ms ease;
    }

    .favorite-card[data-active="true"] {
      background: linear-gradient(90deg, var(--lcars-lilac), var(--lcars-pink));
    }

    .favorite-card:active {
      transform: scale(0.98);
    }

    .favorite-name {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 1rem;
      line-height: 1;
    }

    .favorite-temp {
      font-size: 1.25rem;
      line-height: 1;
      white-space: nowrap;
    }

    .radar-panel {
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 8px;
      padding: 8px 10px 10px;
      min-height: 0;
    }

    .radar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .radar-time {
      color: var(--lcars-apricot);
      font-size: 0.95rem;
      line-height: 1;
      padding: 5px 10px;
      border-radius: 999px;
      background: rgba(246,184,140,0.12);
    }

    .map-wrap {
      position: relative;
      min-height: 0;
      overflow: hidden;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.04);
      background: #050505;
    }

    #map {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      filter: saturate(0.55) brightness(0.78) contrast(1.1);
    }

    .footer {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 12px;
      padding: 0 10px;
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1;
    }

    .footer strong {
      color: var(--lcars-apricot);
      font-weight: 500;
    }

    dialog.search-dialog {
      width: min(92vw, 420px);
      border: none;
      padding: 0;
      border-radius: 24px;
      background: #090909;
      color: var(--text);
      box-shadow: 0 16px 50px rgba(0,0,0,0.65);
    }

    dialog::backdrop { background: rgba(0,0,0,0.65); }

    .search-box {
      padding: 16px;
      display: grid;
      gap: 10px;
    }

    .search-box h2 {
      margin: 0;
      font-size: 1.4rem;
      font-weight: 500;
      color: var(--lcars-apricot);
    }

    .search-form {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
    }

    .search-form input {
      width: 100%;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      background: #131313;
      color: var(--text);
      font: inherit;
      padding: 12px 14px;
      outline: none;
    }

    .search-form button,
    .search-results button,
    .close-button {
      border: none;
      border-radius: 16px;
      font: inherit;
      cursor: pointer;
    }

    .search-form button {
      background: linear-gradient(90deg, var(--lcars-orange), var(--lcars-apricot));
      color: #180d06;
      padding: 12px 14px;
    }

    .search-results {
      display: grid;
      gap: 8px;
      max-height: 42vh;
      overflow: auto;
    }

    .search-results button {
      background: rgba(157,151,245,0.14);
      color: var(--text);
      text-align: left;
      padding: 12px 14px;
    }

    .dialog-actions {
      display: flex;
      justify-content: flex-end;
    }

    .close-button {
      background: rgba(255,255,255,0.07);
      color: var(--text);
      padding: 10px 14px;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(20px + var(--safe-bottom));
      transform: translateX(-50%);
      z-index: 40;
      background: rgba(18,18,18,0.92);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 0.9rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 160ms ease;
    }

    .toast.show { opacity: 1; }

    @media (max-height: 760px) {
      .app { gap: 8px; }
      .forecast-meta, .footer, .radar-time, .status, .sun-date, .sun-chip, .legend-item { font-size: 0.8rem; }
      .favorite-temp { font-size: 1.1rem; }
      .favorite-name { font-size: 0.92rem; }
    }
  </style>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
</head>
<body>
  <main class="app">
    <section class="panel">
      <div class="lcars-shell">
        <div class="lcars-side"></div>
        <div class="lcars-main header">
          <div class="location-block">
            <div class="location-pill">
              <div id="locationName" class="location-name">Wird geladen...</div>
              <button id="openSearchButton" class="location-button">ORT</button>
            </div>
          </div>
          <div class="status-box">
            <div id="clock" class="clock">--:--</div>
            <div id="statusBadge" class="status">INITIALISIERE</div>
          </div>
        </div>
        <div class="lcars-side"></div>
      </div>
    </section>

    <section class="panel forecast-panel">
      <div class="forecast-top">
        <div class="forecast-title">72 STUNDEN</div>
        <div class="model-legend">
          <span class="legend-item"><span class="legend-dot" style="background:#f6b88c"></span>ECMWF</span>
          <span class="legend-item"><span class="legend-dot" style="background:#ff9c2f"></span>ICON</span>
          <span class="legend-item"><span class="legend-dot" style="background:#9d97f5"></span>GFS</span>
        </div>
        <div id="currentTempNow" class="forecast-title">--°</div>
      </div>
      <div class="forecast-canvas-wrap">
        <canvas id="forecastCanvas"></canvas>
      </div>
      <div class="forecast-meta">
        <span><strong id="metaMin">--°</strong> MIN</span>
        <span style="text-align:center"><strong id="metaRain">-- mm</strong> REGEN</span>
        <span style="text-align:right"><strong id="metaMax">--°</strong> MAX</span>
      </div>
    </section>

    <section class="panel sun-panel">
      <div id="sunriseValue" class="sun-chip">SUNRISE --:--</div>
      <div id="sunDate" class="sun-date">--</div>
      <div id="sunsetValue" class="sun-chip" style="text-align:right">SUNSET --:--</div>
    </section>

    <section class="panel favorites-panel">
      <div class="section-title">FAVORITEN</div>
      <div id="favoritesGrid" class="favorites-grid"></div>
    </section>

    <section class="panel radar-panel">
      <div class="radar-header">
        <div class="section-title" style="background:rgba(255,156,47,0.12); color:var(--lcars-orange)">RADAR</div>
        <div id="radarTime" class="radar-time">RADAR --:--</div>
      </div>
      <div class="map-wrap"><div id="map"></div></div>
    </section>

    <section class="panel footer">
      <div id="footerLeft">LETZTES UPDATE <strong>--:--</strong></div>
      <div id="footerRight">MODELLE <strong>ECMWF ICON GFS</strong></div>
    </section>
  </main>

  <dialog id="searchDialog" class="search-dialog">
    <div class="search-box">
      <h2>ORT WÄHLEN</h2>
      <form id="searchForm" class="search-form">
        <input id="searchInput" type="text" placeholder="Ort eingeben" autocomplete="off" />
        <button type="submit">SUCHEN</button>
      </form>
      <div id="searchResults" class="search-results"></div>
      <div class="dialog-actions">
        <button id="closeSearchButton" class="close-button" type="button">SCHLIESSEN</button>
      </div>
    </div>
  </dialog>

  <div id="toast" class="toast"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script>
    const MODELS = [
      { key: 'ecmwf', label: 'ECMWF', color: '#f6b88c' },
      { key: 'icon', label: 'ICON', color: '#ff9c2f' },
      { key: 'gfs', label: 'GFS', color: '#9d97f5' },
    ];

    const DEFAULT_FAVORITES = [
      { name: 'Kornwestheim', latitude: 48.8616, longitude: 9.1852 },
      { name: 'Stuttgart', latitude: 48.7758, longitude: 9.1829 },
      { name: 'Ludwigsburg', latitude: 48.8973, longitude: 9.1916 },
      { name: 'Heilbronn', latitude: 49.1427, longitude: 9.2109 },
    ];

    const STORAGE_KEYS = {
      currentLocation: 'lcars-weather-current-location',
      favorites: 'lcars-weather-favorites',
      cache: 'lcars-weather-cache-v1',
      radarMeta: 'lcars-weather-radar-meta-v1',
    };

    const state = {
      location: null,
      weather: null,
      lastUpdate: null,
      isOffline: !navigator.onLine,
      map: null,
      baseLayer: null,
      radarLayer: null,
      radarTimestamp: null,
      favorites: [],
      forecastDataByModel: {},
    };

    const els = {
      locationName: document.getElementById('locationName'),
      openSearchButton: document.getElementById('openSearchButton'),
      clock: document.getElementById('clock'),
      statusBadge: document.getElementById('statusBadge'),
      currentTempNow: document.getElementById('currentTempNow'),
      metaMin: document.getElementById('metaMin'),
      metaMax: document.getElementById('metaMax'),
      metaRain: document.getElementById('metaRain'),
      sunriseValue: document.getElementById('sunriseValue'),
      sunsetValue: document.getElementById('sunsetValue'),
      sunDate: document.getElementById('sunDate'),
      favoritesGrid: document.getElementById('favoritesGrid'),
      radarTime: document.getElementById('radarTime'),
      footerLeft: document.getElementById('footerLeft'),
      footerRight: document.getElementById('footerRight'),
      searchDialog: document.getElementById('searchDialog'),
      searchForm: document.getElementById('searchForm'),
      searchInput: document.getElementById('searchInput'),
      searchResults: document.getElementById('searchResults'),
      closeSearchButton: document.getElementById('closeSearchButton'),
      toast: document.getElementById('toast'),
      forecastCanvas: document.getElementById('forecastCanvas'),
    };

    function toast(message) {
      els.toast.textContent = message;
      els.toast.classList.add('show');
      clearTimeout(toast._timer);
      toast._timer = setTimeout(() => els.toast.classList.remove('show'), 2200);
    }

    function updateClock() {
      const now = new Date();
      els.clock.textContent = formatTime(now);
    }

    function formatTime(dateLike) {
      const d = new Date(dateLike);
      return d.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
    }

    function formatDayDate(dateLike) {
      const d = new Date(dateLike);
      return d.toLocaleDateString('de-DE', { weekday: 'short', day: '2-digit', month: '2-digit' }).replace('.', '').toUpperCase();
    }

    function formatDateLong(dateLike) {
      return new Date(dateLike).toLocaleDateString('de-DE', { weekday: 'short', day: '2-digit', month: '2-digit', year: 'numeric' }).toUpperCase();
    }

    function setStatus(text) {
      els.statusBadge.textContent = text;
    }

    function loadStoredData() {
      const favoritesRaw = localStorage.getItem(STORAGE_KEYS.favorites);
      state.favorites = favoritesRaw ? JSON.parse(favoritesRaw) : DEFAULT_FAVORITES;

      const currentRaw = localStorage.getItem(STORAGE_KEYS.currentLocation);
      if (currentRaw) state.location = JSON.parse(currentRaw);

      const cacheRaw = localStorage.getItem(STORAGE_KEYS.cache);
      if (cacheRaw) {
        try {
          const cached = JSON.parse(cacheRaw);
          if (cached.location && cached.weather) {
            state.location = state.location || cached.location;
            state.weather = cached.weather;
            state.lastUpdate = cached.lastUpdate || null;
          }
        } catch {}
      }

      const radarMetaRaw = localStorage.getItem(STORAGE_KEYS.radarMeta);
      if (radarMetaRaw) {
        try {
          const parsed = JSON.parse(radarMetaRaw);
          state.radarTimestamp = parsed.timestamp || null;
        } catch {}
      }
    }

    function persistCurrentLocation() {
      if (state.location) localStorage.setItem(STORAGE_KEYS.currentLocation, JSON.stringify(state.location));
    }

    function persistFavorites() {
      localStorage.setItem(STORAGE_KEYS.favorites, JSON.stringify(state.favorites));
    }

    function persistCache() {
      if (!state.location || !state.weather) return;
      localStorage.setItem(STORAGE_KEYS.cache, JSON.stringify({
        location: state.location,
        weather: state.weather,
        lastUpdate: state.lastUpdate,
      }));
    }

    function persistRadarMeta(timestamp) {
      localStorage.setItem(STORAGE_KEYS.radarMeta, JSON.stringify({ timestamp }));
    }

    async function detectLocation() {
      if (!('geolocation' in navigator)) return null;
      return new Promise((resolve) => {
        navigator.geolocation.getCurrentPosition(
          (position) => resolve({
            name: 'Aktueller Ort',
            latitude: position.coords.latitude,
            longitude: position.coords.longitude,
          }),
          () => resolve(null),
          { enableHighAccuracy: true, timeout: 8000, maximumAge: 600000 }
        );
      });
    }

    async function reverseGeocode(lat, lon) {
      try {
        const url = `https://geocoding-api.open-meteo.com/v1/reverse?latitude=${lat}&longitude=${lon}&language=de&format=json`;
        const response = await fetch(url);
        if (!response.ok) throw new Error('Reverse geocoding fehlgeschlagen');
        const data = await response.json();
        const result = data.results?.[0];
        if (!result) return null;
        return {
          name: result.name,
          latitude: result.latitude,
          longitude: result.longitude,
        };
      } catch {
        return null;
      }
    }

    async function geocodeLocation(query) {
      const url = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&count=8&language=de&format=json`;
      const response = await fetch(url);
      if (!response.ok) throw new Error('Suche fehlgeschlagen');
      const data = await response.json();
      return (data.results || []).map(item => ({
        name: [item.name, item.admin1, item.country_code].filter(Boolean).join(', '),
        latitude: item.latitude,
        longitude: item.longitude,
      }));
    }

    async function fetchModelForecast(location, modelKey) {
      const url = new URL('https://api.open-meteo.com/v1/forecast');
      url.searchParams.set('latitude', location.latitude);
      url.searchParams.set('longitude', location.longitude);
      url.searchParams.set('hourly', 'temperature_2m,precipitation');
      url.searchParams.set('daily', 'sunrise,sunset');
      url.searchParams.set('current', 'temperature_2m');
      url.searchParams.set('forecast_days', '4');
      url.searchParams.set('timezone', 'auto');
      url.searchParams.set('models', modelKey);
      const response = await fetch(url.toString(), { cache: 'no-store' });
      if (!response.ok) throw new Error(`Forecast fehlgeschlagen für ${modelKey}`);
      return response.json();
    }

    function extractForecast72h(apiData) {
      const times = apiData.hourly.time.slice(0, 72);
      return {
        times,
        temps: apiData.hourly.temperature_2m.slice(0, 72),
        rain: apiData.hourly.precipitation.slice(0, 72),
        currentTemp: apiData.current?.temperature_2m ?? apiData.hourly.temperature_2m[0],
        sunrise: apiData.daily?.sunrise?.[0] ?? null,
        sunset: apiData.daily?.sunset?.[0] ?? null,
      };
    }

    async function fetchWeatherForLocation(location) {
      const entries = await Promise.all(MODELS.map(async model => ({
        key: model.key,
        data: extractForecast72h(await fetchModelForecast(location, model.key)),
      })));
      const byModel = Object.fromEntries(entries.map(entry => [entry.key, entry.data]));
      const reference = byModel.ecmwf || byModel.icon || byModel.gfs;
      return {
        location,
        byModel,
        sunrise: reference.sunrise,
        sunset: reference.sunset,
        times: reference.times,
        rain: reference.rain,
        currentTemp: reference.currentTemp,
      };
    }

    async function updateFavoriteTemperatures() {
      const items = await Promise.all(state.favorites.map(async favorite => {
        try {
          const url = new URL('https://api.open-meteo.com/v1/forecast');
          url.searchParams.set('latitude', favorite.latitude);
          url.searchParams.set('longitude', favorite.longitude);
          url.searchParams.set('current', 'temperature_2m');
          url.searchParams.set('timezone', 'auto');
          const response = await fetch(url.toString(), { cache: 'no-store' });
          if (!response.ok) throw new Error();
          const data = await response.json();
          return { ...favorite, temperature: Math.round(data.current.temperature_2m) };
        } catch {
          return { ...favorite, temperature: favorite.temperature ?? null };
        }
      }));
      state.favorites = items;
      persistFavorites();
      renderFavorites();
    }

    function renderFavorites() {
      els.favoritesGrid.innerHTML = '';
      state.favorites.slice(0, 4).forEach(favorite => {
        const button = document.createElement('button');
        button.className = 'favorite-card';
        const isActive = state.location && Math.abs(favorite.latitude - state.location.latitude) < 0.01 && Math.abs(favorite.longitude - state.location.longitude) < 0.01;
        button.dataset.active = String(isActive);
        button.innerHTML = `
          <span class="favorite-name">${favorite.name}</span>
          <span class="favorite-temp">${favorite.temperature == null ? '--°' : `${favorite.temperature}°`}</span>
        `;
        button.addEventListener('click', async () => {
          state.location = { name: favorite.name, latitude: favorite.latitude, longitude: favorite.longitude };
          persistCurrentLocation();
          await refreshWeather(true);
        });
        els.favoritesGrid.appendChild(button);
      });
    }

    function drawForecastChart(weather) {
      const canvas = els.forecastCanvas;
      const ratio = Math.max(window.devicePixelRatio || 1, 1);
      const rect = canvas.getBoundingClientRect();
      canvas.width = Math.floor(rect.width * ratio);
      canvas.height = Math.floor(rect.height * ratio);
      const ctx = canvas.getContext('2d');
      ctx.scale(ratio, ratio);
      ctx.clearRect(0, 0, rect.width, rect.height);

      const padding = { top: 24, right: 12, bottom: 38, left: 32 };
      const chartW = rect.width - padding.left - padding.right;
      const chartH = rect.height - padding.top - padding.bottom;
      const rainZoneHeight = chartH * 0.22;
      const tempZoneHeight = chartH - rainZoneHeight - 6;
      const times = weather.times;

      const allTemps = MODELS.flatMap(model => weather.byModel[model.key]?.temps || []);
      const minTemp = Math.floor(Math.min(...allTemps, 0) - 1);
      const maxTemp = Math.ceil(Math.max(...allTemps, 0) + 1);
      const tempRange = Math.max(1, maxTemp - minTemp);
      const maxRain = Math.max(2, ...weather.rain);

      const xForIndex = (i) => padding.left + (i / (times.length - 1)) * chartW;
      const yForTemp = (temp) => padding.top + ((maxTemp - temp) / tempRange) * tempZoneHeight;
      const yRainBase = padding.top + tempZoneHeight + 6 + rainZoneHeight;
      const yForRainTop = (value) => yRainBase - (value / maxRain) * rainZoneHeight;

      ctx.save();
      ctx.strokeStyle = 'rgba(210, 192, 255, 0.10)';
      ctx.lineWidth = 1;
      for (let t = 0; t <= tempRange; t += 2) {
        const value = minTemp + t;
        const y = yForTemp(value);
        ctx.beginPath();
        ctx.moveTo(padding.left, y);
        ctx.lineTo(rect.width - padding.right, y);
        ctx.stroke();
      }

      for (let i = 0; i < times.length; i++) {
        const d = new Date(times[i]);
        const hour = d.getHours();
        const x = xForIndex(i);
        const isDayStart = hour === 0;
        const isSixHours = hour % 6 === 0;
        if (isSixHours || isDayStart) {
          ctx.strokeStyle = isDayStart ? 'rgba(210, 192, 255, 0.26)' : 'rgba(210, 192, 255, 0.13)';
          ctx.beginPath();
          ctx.moveTo(x, padding.top);
          ctx.lineTo(x, yRainBase);
          ctx.stroke();
        }
      }
      ctx.restore();

      ctx.save();
      ctx.fillStyle = 'rgba(255,156,47,0.42)';
      const barWidth = Math.max(2, chartW / times.length - 1.5);
      weather.rain.forEach((value, i) => {
        const x = xForIndex(i) - barWidth / 2;
        const y = yForRainTop(value);
        ctx.fillRect(x, y, barWidth, Math.max(1, yRainBase - y));
      });
      ctx.restore();

      MODELS.forEach(model => {
        const series = weather.byModel[model.key]?.temps;
        if (!series) return;
        ctx.save();
        ctx.strokeStyle = model.color;
        ctx.globalAlpha = 0.8;
        ctx.lineWidth = 2.2;
        ctx.beginPath();
        series.forEach((temp, i) => {
          const x = xForIndex(i);
          const y = yForTemp(temp);
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        });
        ctx.stroke();
        ctx.restore();
      });

      ctx.save();
      ctx.font = '12px Oswald';
      ctx.fillStyle = 'rgba(243,212,191,0.85)';
      ctx.textAlign = 'right';
      for (let value = minTemp; value <= maxTemp; value += 4) {
        const y = yForTemp(value);
        ctx.fillText(`${value}°`, padding.left - 6, y + 4);
      }
      ctx.textAlign = 'center';
      for (let i = 0; i < times.length; i++) {
        const d = new Date(times[i]);
        const hour = d.getHours();
        if (hour % 6 === 0) {
          const x = xForIndex(i);
          ctx.fillStyle = hour === 0 ? 'rgba(157,151,245,0.95)' : 'rgba(243,212,191,0.82)';
          ctx.fillText(`${String(hour).padStart(2, '0')}:00`, x, rect.height - 16);
          if (hour === 0) {
            ctx.fillStyle = 'rgba(246,184,140,0.95)';
            ctx.fillText(formatDayDate(d), x + 24, padding.top - 8);
          }
        }
      }
      ctx.restore();
    }

    function updateSummary(weather) {
      els.locationName.textContent = state.location.name;
      els.currentTempNow.textContent = `${Math.round(weather.currentTemp)}°`;
      const ecmwf = weather.byModel.ecmwf?.temps || [];
      const rainTotal = weather.rain.reduce((sum, value) => sum + (value || 0), 0);
      if (ecmwf.length) {
        els.metaMin.textContent = `${Math.round(Math.min(...ecmwf))}°`;
        els.metaMax.textContent = `${Math.round(Math.max(...ecmwf))}°`;
      }
      els.metaRain.textContent = `${rainTotal.toFixed(1)} mm`;
      els.sunriseValue.textContent = `SUNRISE ${weather.sunrise ? formatTime(weather.sunrise) : '--:--'}`;
      els.sunsetValue.textContent = `SUNSET ${weather.sunset ? formatTime(weather.sunset) : '--:--'}`;
      els.sunDate.textContent = weather.sunrise ? formatDateLong(weather.sunrise) : '--';
      els.footerLeft.innerHTML = `LETZTES UPDATE <strong>${state.lastUpdate ? formatTime(state.lastUpdate) : '--:--'}</strong>`;
      updateStatusLabel();
      renderFavorites();
      drawForecastChart(weather);
    }

    function updateStatusLabel() {
      if (state.isOffline) setStatus('OFFLINE');
      else if (state.lastUpdate) setStatus('ONLINE');
      else setStatus('BEREIT');
    }

    function initMap() {
      state.map = L.map('map', { zoomControl: false, attributionControl: false });
      state.baseLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        subdomains: 'abcd',
        maxZoom: 19,
      }).addTo(state.map);
    }

    async function updateRadar() {
      if (!state.map || !state.location) return;
      state.map.setView([state.location.latitude, state.location.longitude], 8, { animate: false });
      try {
        const response = await fetch('https://api.rainviewer.com/public/weather-maps.json', { cache: 'no-store' });
        if (!response.ok) throw new Error('Radar-Metadaten fehlgeschlagen');
        const data = await response.json();
        const latest = data.radar?.past?.at(-1) || data.radar?.nowcast?.[0];
        if (!latest) throw new Error('Kein Radarbild verfügbar');
        const tileUrl = `https://tilecache.rainviewer.com${latest.path}/256/{z}/{x}/{y}/2/1_1.png`;
        if (state.radarLayer) state.map.removeLayer(state.radarLayer);
        state.radarLayer = L.tileLayer(tileUrl, {
          tileSize: 256,
          opacity: 0.65,
          zIndex: 10,
        }).addTo(state.map);
        state.radarTimestamp = latest.time * 1000;
        persistRadarMeta(state.radarTimestamp);
        els.radarTime.textContent = `RADAR ${formatTime(state.radarTimestamp)}`;
      } catch (error) {
        els.radarTime.textContent = `RADAR ${state.radarTimestamp ? formatTime(state.radarTimestamp) : '--:--'}`;
        toast('Radar konnte nicht aktualisiert werden');
      }
    }

    async function refreshWeather(focusMap = false) {
      if (!state.location) return;
      try {
        if (!navigator.onLine && state.weather) {
          state.isOffline = true;
          updateSummary(state.weather);
          toast('Zeige zwischengespeicherte Daten');
          await updateRadar();
          return;
        }
        setStatus('AKTUALISIERE');
        const weather = await fetchWeatherForLocation(state.location);
        state.weather = weather;
        state.lastUpdate = Date.now();
        state.isOffline = false;
        persistCache();
        updateSummary(weather);
        await updateFavoriteTemperatures();
        await updateRadar();
        if (focusMap && state.map) state.map.setView([state.location.latitude, state.location.longitude], 8, { animate: false });
      } catch (error) {
        console.error(error);
        state.isOffline = !navigator.onLine;
        updateStatusLabel();
        if (state.weather) {
          updateSummary(state.weather);
          toast('Netzwerkfehler. Zeige letzte Daten');
        } else {
          toast('Wetterdaten konnten nicht geladen werden');
        }
      }
    }

    async function initializeLocation() {
      if (state.location) return;
      const detected = await detectLocation();
      if (detected) {
        const named = await reverseGeocode(detected.latitude, detected.longitude);
        state.location = named || detected;
        persistCurrentLocation();
        return;
      }
      state.location = state.favorites[0];
      persistCurrentLocation();
    }

    function setupSearch() {
      els.openSearchButton.addEventListener('click', () => {
        els.searchDialog.showModal();
        setTimeout(() => els.searchInput.focus(), 50);
      });
      els.closeSearchButton.addEventListener('click', () => els.searchDialog.close());
      els.searchForm.addEventListener('submit', async (event) => {
        event.preventDefault();
        const q = els.searchInput.value.trim();
        if (!q) return;
        els.searchResults.innerHTML = '<button type="button">SUCHE LÄUFT...</button>';
        try {
          const results = await geocodeLocation(q);
          els.searchResults.innerHTML = '';
          if (!results.length) {
            els.searchResults.innerHTML = '<button type="button">KEINE TREFFER</button>';
            return;
          }
          results.forEach(result => {
            const button = document.createElement('button');
            button.type = 'button';
            button.textContent = result.name;
            button.addEventListener('click', async () => {
              state.location = result;
              persistCurrentLocation();
              const exists = state.favorites.some(f => f.name === result.name);
              if (!exists) {
                state.favorites = [result, ...state.favorites].slice(0, 4);
                persistFavorites();
              }
              els.searchDialog.close();
              await refreshWeather(true);
            });
            els.searchResults.appendChild(button);
          });
        } catch {
          els.searchResults.innerHTML = '<button type="button">SUCHE FEHLGESCHLAGEN</button>';
        }
      });
    }

    function setupNetworkEvents() {
      window.addEventListener('online', async () => {
        state.isOffline = false;
        updateStatusLabel();
        toast('Wieder online');
        await refreshWeather();
      });
      window.addEventListener('offline', () => {
        state.isOffline = true;
        updateStatusLabel();
        toast('Offline');
      });
      window.addEventListener('resize', () => {
        if (state.weather) drawForecastChart(state.weather);
      });
    }

    async function registerServiceWorker() {
      if (!('serviceWorker' in navigator)) return;
      const swCode = `
        const CACHE_NAME = 'lcars-weather-static-v1';
        self.addEventListener('install', event => {
          event.waitUntil(caches.open(CACHE_NAME).then(cache => cache.addAll(['./'])));
          self.skipWaiting();
        });
        self.addEventListener('activate', event => {
          event.waitUntil(self.clients.claim());
        });
        self.addEventListener('fetch', event => {
          const request = event.request;
          if (request.method !== 'GET') return;
          event.respondWith(
            fetch(request).then(response => {
              const copy = response.clone();
              caches.open(CACHE_NAME).then(cache => cache.put(request, copy)).catch(() => {});
              return response;
            }).catch(() => caches.match(request).then(match => match || caches.match('./')))
          );
        });
      `;
      const blob = new Blob([swCode], { type: 'text/javascript' });
      const url = URL.createObjectURL(blob);
      try { await navigator.serviceWorker.register(url); } catch {}
    }

    async function init() {
      loadStoredData();
      updateClock();
      setInterval(updateClock, 1000 * 30);
      setupSearch();
      setupNetworkEvents();
      initMap();
      renderFavorites();
      if (state.weather) updateSummary(state.weather);
      await initializeLocation();
      await refreshWeather(true);
      registerServiceWorker();
    }

    init();
  </script>
</body>
</html>
