<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Wetter</title>

  <meta name="application-name" content="Wetter" />
  <meta name="theme-color" content="#000000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Wetter" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="apple-touch-icon" href="icon.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

  <style>
    :root {
      --bg: #000000;
      --text: #f3d4bf;
      --muted: #c6b4ea;
      --lcars-pink: #c88ab1;
      --lcars-lilac: #9d97f5;
      --lcars-orange: #ff9c2f;
      --lcars-apricot: #f6b88c;
      --shadow: 0 0 0 1px rgba(255,255,255,0.03), 0 8px 28px rgba(0,0,0,0.45);
      --radius-pill: 28px;
      --radius-panel: 24px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; }

    html, body {
      height: 100%;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Oswald', sans-serif;
      overflow: hidden;
      letter-spacing: 0.02em;
      overscroll-behavior: none;
      text-transform: uppercase;
    }

.app {
  height: var(--app-height, 100vh);
  min-height: var(--app-height, 100vh);
  padding: calc(10px + var(--safe-top)) 12px calc(8px + var(--safe-bottom));
  display: grid;
  grid-template-rows: 0.11fr 0.38fr 0.17fr 0.24fr 0.14fr 0.02fr;
  gap: 8px;
  background: #000000;
  touch-action: pan-x;
}
    
.daily-panel {
  padding: 8px 10px;
  min-height: 0;
  display: flex;
  align-items: stretch;
}

.daily-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 8px;
  width: 100%;
  min-height: 0;
}

.daily-card {
  min-width: 0;
  border-radius: 20px;
  background: linear-gradient(180deg, rgba(157,151,245,0.10), rgba(255,156,47,0.08));
  border: 1px solid rgba(255,255,255,0.04);
  padding: 8px 8px 7px;
  display: grid;
  grid-template-rows: auto auto auto auto;
  justify-items: center;
  align-items: center;
  gap: 4px;
}

.daily-day {
  color: var(--lcars-apricot);
  font-size: 0.78rem;
  line-height: 1;
  text-align: center;
  white-space: nowrap;
}

.daily-icon {
  width: 34px;
  height: 34px;
  display: block;
}

.daily-temp {
  color: var(--text);
  font-size: 0.82rem;
  line-height: 1;
  text-align: center;
  white-space: nowrap;
}

.daily-rain {
  color: var(--muted);
  font-size: 0.72rem;
  line-height: 1;
  text-align: center;
  white-space: nowrap;
}

    .panel {
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      border-radius: var(--radius-panel);
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
      min-height: 0;
    }

    .lcars-shell {
      display: block;
      height: 100%;
    }

    .lcars-main {
      min-width: 0;
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      padding: 8px 8px;
      min-width: 0;
      gap: 10px;
      height: 100%;
    }

    .location-block {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
    }

    .location-pill {
      min-width: 0;
      width: 100%;
      border-radius: var(--radius-pill);
      background: linear-gradient(90deg, rgba(200,138,177,0.95), rgba(157,151,245,0.92));
      padding: 8px 16px;
      color: #10080d;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .location-name {
      font-size: clamp(1.45rem, 4vw, 2rem);
      line-height: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
    }

    .location-button {
      border: none;
      background: rgba(0,0,0,0.18);
      color: #140b11;
      border-radius: 999px;
      padding: 7px 12px;
      font: inherit;
      cursor: pointer;
      flex-shrink: 0;
    }

    .status-box {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
      min-width: 70px;
    }

    .clock {
      color: var(--lcars-apricot);
      font-size: clamp(1.15rem, 3vw, 1.45rem);
      line-height: 1;
    }

    .status {
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1;
      background: rgba(157,151,245,0.16);
      padding: 5px 10px;
      border-radius: 999px;
      white-space: nowrap;
    }

    .forecast-panel {
      padding: 8px 10px 6px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 5px;
      min-height: 0;
    }

    .forecast-top {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 6px;
      padding: 0 2px;
      min-width: 0;
    }

    .forecast-title {
      color: var(--lcars-orange);
      font-size: 0.94rem;
      line-height: 1;
      padding: 5px 10px;
      border-radius: 999px;
      background: rgba(255,156,47,0.12);
      white-space: nowrap;
    }

    .model-legend {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 5px;
      flex-wrap: nowrap;
      min-width: 0;
      overflow: hidden;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: var(--text);
      font-size: 0.72rem;
      background: rgba(255,255,255,0.03);
      padding: 3px 6px;
      border-radius: 999px;
      white-space: nowrap;
      min-width: 0;
    }

    .legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      display: inline-block;
      flex-shrink: 0;
    }

    .forecast-canvas-wrap {
      position: relative;
      min-height: 0;
      border-radius: 18px;
      overflow: hidden;
      background: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.01));
      border: 1px solid rgba(255,255,255,0.04);
      touch-action: none;
    }

    #forecastCanvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .chart-tooltip {
      position: absolute;
      z-index: 5;
      min-width: 132px;
      max-width: 180px;
      pointer-events: none;
      border-radius: 18px;
      padding: 10px 12px;
      background: rgba(10,10,10,0.92);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 8px 24px rgba(0,0,0,0.45);
      color: var(--text);
      font-size: 0.82rem;
      line-height: 1.15;
      backdrop-filter: blur(8px);
    }

    .chart-tooltip strong {
      color: var(--lcars-apricot);
      font-weight: 500;
    }

    .chart-tooltip .tt-time {
      color: var(--lcars-apricot);
      margin-bottom: 6px;
      font-size: 0.9rem;
    }

    .chart-tooltip .tt-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-top: 3px;
    }

    .chart-tooltip .tt-label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
    }

    .chart-tooltip .tt-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      display: inline-block;
    }

    .forecast-meta {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      font-size: 0.82rem;
      color: var(--muted);
      padding: 0 4px;
    }

    .forecast-meta span strong {
      color: var(--lcars-apricot);
      font-weight: 500;
    }

    .sun-panel {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      min-height: 0;
    }

    .sun-chip {
      background: linear-gradient(90deg, rgba(246,184,140,0.15), rgba(255,156,47,0.12));
      border-radius: var(--radius-pill);
      padding: 8px 12px;
      color: var(--lcars-apricot);
      font-size: clamp(0.9rem, 2.6vw, 1rem);
      line-height: 1;
      white-space: nowrap;
    }

    .sun-date {
      color: var(--muted);
      font-size: 0.86rem;
      text-align: center;
      white-space: nowrap;
    }

    .favorites-panel {
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 6px;
      padding: 7px 10px 8px;
      min-height: 0;
    }

    .section-title {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--lcars-lilac);
      font-size: 0.94rem;
      line-height: 1;
      padding: 5px 10px;
      border-radius: 999px;
      background: rgba(157,151,245,0.12);
      width: fit-content;
    }

.favorites-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  grid-template-rows: repeat(2, 1fr);
  column-gap: 8px;
  row-gap: 8px;
  min-height: 0;
  height: 100%;
  align-content: stretch;
}

    .favorite-card {
      border: none;
      min-width: 0;
      min-height: 0;
      border-radius: 24px;
      cursor: pointer;
      font: inherit;
      text-align: left;
      color: #120910;
      background: linear-gradient(90deg, var(--lcars-orange), var(--lcars-apricot));
      padding: 12px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      transition: transform 120ms ease, filter 120ms ease;
      overflow: hidden;
	  margin: 0;
	  height: 100%;	
    }

    .favorite-card[data-active="true"] {
      background: linear-gradient(90deg, var(--lcars-lilac), var(--lcars-pink));
    }

    .favorite-card:active {
      transform: scale(0.98);
    }

    .favorite-name {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 0.8rem !important;
      line-height: 1;
    }

    .favorite-temp {
      font-size: 0.8rem !important;
      line-height: 1;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .radar-panel {
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 6px;
      padding: 8px 10px 10px;
      min-height: 0;
    }

    .radar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .radar-time {
      color: var(--lcars-apricot);
      font-size: 0.9rem;
      line-height: 1;
      padding: 5px 10px;
      border-radius: 999px;
      background: rgba(246,184,140,0.12);
      white-space: nowrap;
    }

    .map-wrap {
      position: relative;
      min-height: 0;
      overflow: hidden;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.04);
      background: #050505;
    }

    #map {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      filter: saturate(0.55) brightness(0.78) contrast(1.1);
    }

    .footer {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 12px;
      padding: 0 10px;
      color: var(--muted);
      font-size: 0.8rem;
      line-height: 1;
      min-width: 0;
    }

    .footer strong {
      color: var(--lcars-apricot);
      font-weight: 500;
    }

    dialog.search-dialog {
      width: min(92vw, 420px);
      border: none;
      padding: 0;
      border-radius: 24px;
      background: #090909;
      color: var(--text);
      box-shadow: 0 16px 50px rgba(0,0,0,0.65);
    }

    dialog::backdrop {
      background: rgba(0,0,0,0.65);
    }

    .search-box {
      padding: 16px;
      display: grid;
      gap: 10px;
    }

    .search-box h2 {
      margin: 0;
      font-size: 1.35rem;
      font-weight: 500;
      color: var(--lcars-apricot);
    }

    .search-form {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
    }

    .search-form input {
      width: 100%;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      background: #131313;
      color: var(--text);
      font: inherit;
      padding: 12px 14px;
      outline: none;
    }

    .search-form button,
    .search-results button,
    .close-button {
      border: none;
      border-radius: 16px;
      font: inherit;
      cursor: pointer;
    }

    .search-form button {
      background: linear-gradient(90deg, var(--lcars-orange), var(--lcars-apricot));
      color: #180d06;
      padding: 12px 14px;
    }

    .search-results {
      display: grid;
      gap: 8px;
      max-height: 42vh;
      overflow: auto;
    }

    .search-results button {
      background: rgba(157,151,245,0.14);
      color: var(--text);
      text-align: left;
      padding: 12px 14px;
    }

    .dialog-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .close-button {
      background: rgba(255,255,255,0.07);
      color: var(--text);
      padding: 10px 14px;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(20px + var(--safe-bottom));
      transform: translateX(-50%);
      z-index: 40;
      background: rgba(18,18,18,0.92);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 0.9rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 160ms ease;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
    }

    @media (max-height: 760px) {
      .app {
        gap: 7px;
        padding: calc(8px + var(--safe-top)) 10px calc(6px + var(--safe-bottom));
      }

      .forecast-meta,
      .footer,
      .radar-time,
      .status,
      .sun-date,
      .sun-chip,
      .legend-item {
        font-size: 0.76rem;
      }

      .favorite-temp {
        font-size: 1.02rem;
      }

      .favorite-name {
        font-size: 0.88rem;
      }

      .forecast-title {
        font-size: 0.86rem;
        padding: 4px 8px;
      }
      
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="panel">
      <div class="lcars-shell">
        <div class="lcars-main header">
          <div class="location-block">
            <div class="location-pill">
              <div id="locationName" class="location-name">Wird geladen...</div>
              <button id="openSearchButton" class="location-button">ORT</button>
            </div>
          </div>
          <div class="status-box">
            <div id="clock" class="clock">--:--</div>
            <div id="statusBadge" class="status">INITIALISIERE</div>
          </div>
        </div>
      </div>
    </section>

    <section class="panel forecast-panel">
<div class="forecast-top">
  <div id="currentTempNow" class="forecast-title">--°</div>
  <div class="model-legend">
    <span class="legend-item"><span class="legend-dot" style="background:#f6b88c"></span>ECMWF</span>
    <span class="legend-item"><span class="legend-dot" style="background:#ff9c2f"></span>ICON</span>
    <span class="legend-item"><span class="legend-dot" style="background:#9d97f5"></span>GFS</span>
  </div>
  <div id="refreshButton" class="forecast-title" style="cursor:pointer">REFRESH</div>
</div>
      <div class="forecast-canvas-wrap">
        <canvas id="forecastCanvas"></canvas>
        <div id="chartTooltip" class="chart-tooltip" hidden></div>
      </div>
    </section>

<section class="panel daily-panel">
  <div id="dailySummary" class="daily-grid"></div>
</section>

    <section class="panel radar-panel">
      <div class="radar-header">
        <div class="section-title" style="background:rgba(255,156,47,0.12); color:var(--lcars-orange)">RADAR</div>
        <div id="radarTime" class="radar-time">RADAR --:--</div>
      </div>
      <div class="map-wrap"><div id="map"></div></div>
    </section>
    
    
    <section class="panel favorites-panel">
      <div class="section-title">FAVORITEN</div>
      <div id="favoritesGrid" class="favorites-grid"></div>
    </section>

    <section class="panel footer">
      <div id="footerLeft">LETZTES UPDATE <strong>--:--</strong></div>
      <div id="footerRight">SOURCES <strong>OPEN-METEO</strong> • <strong>RAINVIEWER</strong>
</div>
    </section>
  </main>

  <dialog id="searchDialog" class="search-dialog">
    <div class="search-box">
      <h2>ORT WÄHLEN</h2>
      <form id="searchForm" class="search-form">
        <input id="searchInput" type="text" placeholder="Ort eingeben" autocomplete="off" />
        <button type="submit">SUCHEN</button>
      </form>
      <div id="searchResults" class="search-results"></div>
      <div class="dialog-actions">
        <button id="useCurrentLocationButton" class="close-button" type="button" style="margin-right:auto;background:rgba(157,151,245,0.18);">AKTUELLER ORT</button>
        <button id="closeSearchButton" class="close-button" type="button">SCHLIESSEN</button>
      </div>
    </div>
  </dialog>

  <div id="toast" class="toast"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script>
    const MODELS = [
      { key: 'ecmwf', label: 'ECMWF', color: '#f6b88c', endpoint: 'https://api.open-meteo.com/v1/ecmwf' },
      { key: 'icon', label: 'ICON', color: '#ff9c2f', endpoint: 'https://api.open-meteo.com/v1/dwd-icon' },
      { key: 'gfs', label: 'GFS', color: '#9d97f5', endpoint: 'https://api.open-meteo.com/v1/gfs' },
    ];

    const DEFAULT_FAVORITES = [
      { name: 'Kornwestheim', latitude: 48.8616, longitude: 9.1852 },
      { name: 'Stuttgart', latitude: 48.7758, longitude: 9.1829 },
      { name: 'Ludwigsburg', latitude: 48.8973, longitude: 9.1916 },
      { name: 'Heilbronn', latitude: 49.1427, longitude: 9.2109 },
    ];

    const STORAGE_KEYS = {
      currentLocation: 'lcars-weather-current-location',
      favorites: 'lcars-weather-favorites',
      cache: 'lcars-weather-cache-v2',
      radarMeta: 'lcars-weather-radar-meta-v1',
    };

    const state = {
      location: null,
      weather: null,
      lastUpdate: null,
      isOffline: !navigator.onLine,
      map: null,
      baseLayer: null,
      radarLayer: null,
      radarTimestamp: null,
      favorites: [],
      chartMetrics: null,
      chartHoverIndex: null,
      pullStartY: null,
      pullTriggered: false,
      pullEligible: false,
    };

    const els = {
      locationName: document.getElementById('locationName'),
      openSearchButton: document.getElementById('openSearchButton'),
      clock: document.getElementById('clock'),
      statusBadge: document.getElementById('statusBadge'),
      currentTempNow: document.getElementById('currentTempNow'),
      favoritesGrid: document.getElementById('favoritesGrid'),
      radarTime: document.getElementById('radarTime'),
      footerLeft: document.getElementById('footerLeft'),
      footerRight: document.getElementById('footerRight'),
      searchDialog: document.getElementById('searchDialog'),
      searchForm: document.getElementById('searchForm'),
      searchInput: document.getElementById('searchInput'),
      searchResults: document.getElementById('searchResults'),
      closeSearchButton: document.getElementById('closeSearchButton'),
      useCurrentLocationButton: document.getElementById('useCurrentLocationButton'),
      toast: document.getElementById('toast'),
      forecastCanvas: document.getElementById('forecastCanvas'),
      chartTooltip: document.getElementById('chartTooltip'),
      dailySummary: document.getElementById('dailySummary'),
      currentTempNow: document.getElementById('currentTempNow'),
      refreshButton: document.getElementById('refreshButton'),
    };

    function installDynamicManifest() {
      const manifest = {
        name: 'Wetter',
        short_name: 'Wetter',
        start_url: './',
        display: 'standalone',
        background_color: '#000000',
        theme_color: '#000000',
        icons: [
          {
            src: 'IMG_7958.png',
            sizes: '192x192',
            type: 'image/png'
          },
          {
            src: 'IMG_7958.png',
            sizes: '512x512',
            type: 'image/png'
          }
        ]
      };

      const blob = new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('link');
      link.rel = 'manifest';
      link.href = url;
      document.head.appendChild(link);
    }

    function toast(message) {
      els.toast.textContent = message;
      els.toast.classList.add('show');
      clearTimeout(toast._timer);
      toast._timer = setTimeout(() => els.toast.classList.remove('show'), 2200);
    }

    function updateClock() {
      els.clock.textContent = formatTime(new Date());
    }

    function formatTime(dateLike) {
      const d = new Date(dateLike);
      return d.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
    }

    function formatDayDate(dateLike) {
      const d = new Date(dateLike);
      return d.toLocaleDateString('de-DE', { weekday: 'short', day: '2-digit', month: '2-digit' }).replace('.', '').toUpperCase();
    }

    function formatDateLong(dateLike) {
      return new Date(dateLike).toLocaleDateString('de-DE', {
        weekday: 'short',
        day: '2-digit',
        month: '2-digit',
        year: 'numeric'
      }).toUpperCase();
    }

    function setStatus(text) {
      els.statusBadge.textContent = text;
    }

    function loadStoredData() {
      const favoritesRaw = localStorage.getItem(STORAGE_KEYS.favorites);
      state.favorites = favoritesRaw ? JSON.parse(favoritesRaw) : DEFAULT_FAVORITES;

      const currentRaw = localStorage.getItem(STORAGE_KEYS.currentLocation);
      if (currentRaw) state.location = JSON.parse(currentRaw);

      const cacheRaw = localStorage.getItem(STORAGE_KEYS.cache);
      if (cacheRaw) {
        try {
          const cached = JSON.parse(cacheRaw);
          if (cached.location && cached.weather) {
            state.location = state.location || cached.location;
            state.weather = cached.weather;
            state.lastUpdate = cached.lastUpdate || null;
          }
        } catch {}
      }

      const radarMetaRaw = localStorage.getItem(STORAGE_KEYS.radarMeta);
      if (radarMetaRaw) {
        try {
          const parsed = JSON.parse(radarMetaRaw);
          state.radarTimestamp = parsed.timestamp || null;
        } catch {}
      }
    }

    function persistCurrentLocation() {
      if (state.location) {
        localStorage.setItem(STORAGE_KEYS.currentLocation, JSON.stringify(state.location));
      }
    }

    function persistFavorites() {
      localStorage.setItem(STORAGE_KEYS.favorites, JSON.stringify(state.favorites));
    }

    function persistCache() {
      if (!state.location || !state.weather) return;
      localStorage.setItem(STORAGE_KEYS.cache, JSON.stringify({
        location: state.location,
        weather: state.weather,
        lastUpdate: state.lastUpdate,
      }));
    }

    function persistRadarMeta(timestamp) {
      localStorage.setItem(STORAGE_KEYS.radarMeta, JSON.stringify({ timestamp }));
    }

    async function detectLocation() {
      if (!('geolocation' in navigator)) return null;
      return new Promise((resolve) => {
        navigator.geolocation.getCurrentPosition(
          (position) => resolve({
            name: 'Aktueller Ort',
            latitude: position.coords.latitude,
            longitude: position.coords.longitude,
          }),
          () => resolve(null),
          { enableHighAccuracy: true, timeout: 8000, maximumAge: 600000 }
        );
      });
    }

    async function reverseGeocode(lat, lon) {
      try {
        const url = `https://geocoding-api.open-meteo.com/v1/reverse?latitude=${lat}&longitude=${lon}&language=de&format=json`;
        const response = await fetch(url);
        if (!response.ok) throw new Error();
        const data = await response.json();
        const result = data.results?.[0];
        if (!result) return null;
        return {
          name: result.name,
          latitude: result.latitude,
          longitude: result.longitude,
        };
      } catch {
        return null;
      }
    }

    async function geocodeLocation(query) {
      const url = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&count=8&language=de&format=json`;
      const response = await fetch(url);
      if (!response.ok) throw new Error('Suche fehlgeschlagen');
      const data = await response.json();
      return (data.results || []).map(item => ({
        name: [item.name, item.admin1, item.country_code].filter(Boolean).join(', '),
        latitude: item.latitude,
        longitude: item.longitude,
      }));
    }

    function getHourlyStartIndex(times) {
      const now = Date.now();
      const idx = times.findIndex(t => new Date(t).getTime() >= now);
      return idx >= 0 ? idx : 0;
    }

    async function fetchModelForecast(location, model) {
      const url = new URL(model.endpoint);
      url.searchParams.set('latitude', location.latitude);
      url.searchParams.set('longitude', location.longitude);
      url.searchParams.set('hourly', 'temperature_2m');
      url.searchParams.set('forecast_days', '4');
      url.searchParams.set('timezone', 'auto');

      const response = await fetch(url.toString(), { cache: 'no-store' });
      if (!response.ok) {
        const text = await response.text().catch(() => '');
        throw new Error(`Forecast fehlgeschlagen für ${model.key}: ${response.status} ${text}`);
      }
      return response.json();
    }

    async function fetchBaseForecast(location) {
      const url = new URL('https://api.open-meteo.com/v1/forecast');
      url.searchParams.set('latitude', location.latitude);
      url.searchParams.set('longitude', location.longitude);
      uurl.searchParams.set('daily', 'sunrise,sunset,temperature_2m_min,temperature_2m_max,precipitation_sum');
      url.searchParams.set('current', 'temperature_2m');
      url.searchParams.set('forecast_days', '4');
      url.searchParams.set('timezone', 'auto');
      url.searchParams.set('hourly', 'precipitation,temperature_2m,weather_code');

      const response = await fetch(url.toString(), { cache: 'no-store' });
      if (!response.ok) throw new Error('Basis-Forecast fehlgeschlagen');
      return response.json();
    }

    function extractModelForecast72h(apiData) {
      const start = getHourlyStartIndex(apiData.hourly.time);
      return {
        times: apiData.hourly.time.slice(start, start + 72),
        temps: apiData.hourly.temperature_2m.slice(start, start + 72),
      };
    }

function extractBaseForecast72h(apiData) {
  const start = getHourlyStartIndex(apiData.hourly.time);
  return {
    times: apiData.hourly.time.slice(start, start + 72),
    rain: apiData.hourly.precipitation.slice(start, start + 72),
    temps: apiData.hourly.temperature_2m.slice(start, start + 72),
    weatherCodes: apiData.hourly.weather_code.slice(start, start + 72),
    currentTemp: apiData.current?.temperature_2m ?? null,
    sunrise: apiData.daily?.sunrise?.[0] ?? null,
    sunset: apiData.daily?.sunset?.[0] ?? null,
    dailyMin: apiData.daily?.temperature_2m_min || [],
    dailyMax: apiData.daily?.temperature_2m_max || [],
    dailyRain: apiData.daily?.precipitation_sum || []
  };
}

    async function fetchWeatherForLocation(location) {
      const baseResult = await fetchBaseForecast(location);
      const base = extractBaseForecast72h(baseResult);
      const byModel = {};

      for (const model of MODELS) {
        try {
          const modelData = await fetchModelForecast(location, model);
          byModel[model.key] = extractModelForecast72h(modelData);
        } catch (error) {
          console.warn(`Modell ${model.key} ausgefallen`, error);
        }
      }

      const availableModelKeys = Object.keys(byModel);
      if (!availableModelKeys.length) {
        const start = getHourlyStartIndex(baseResult.hourly?.time || []);
        const fallbackTemps = baseResult.hourly?.temperature_2m?.slice(start, start + 72);
        if (fallbackTemps && fallbackTemps.length) {
          byModel.ecmwf = { times: base.times, temps: fallbackTemps };
        } else {
          throw new Error('Kein Wettermodell verfügbar');
        }
      }

      const referenceKey = byModel.ecmwf ? 'ecmwf' : Object.keys(byModel)[0];

return {
  location,
  byModel,
  sunrise: base.sunrise,
  sunset: base.sunset,
  times: byModel[referenceKey].times,
  rain: base.rain,
  currentTemp: base.currentTemp ?? byModel[referenceKey].temps[0],
  temps: base.temps,
  weatherCodes: base.weatherCodes,
  dailyMin: base.dailyMin,
  dailyMax: base.dailyMax,
  dailyRain: base.dailyRain
};
    }

    function drawForecastChart(weather) {
      const canvas = els.forecastCanvas;
      const ratio = Math.max(window.devicePixelRatio || 1, 1);
      const rect = canvas.getBoundingClientRect();

      canvas.width = Math.floor(rect.width * ratio);
      canvas.height = Math.floor(rect.height * ratio);

      const ctx = canvas.getContext('2d');
      ctx.scale(ratio, ratio);
      ctx.clearRect(0, 0, rect.width, rect.height);

      const padding = { top: 24, right: 12, bottom: 38, left: 32 };
      const chartW = rect.width - padding.left - padding.right;
      const chartH = rect.height - padding.top - padding.bottom;
      const rainZoneHeight = chartH * 0.28;
      const tempZoneHeight = chartH - rainZoneHeight - 6;
      const times = weather.times;

      const allTemps = MODELS.flatMap(model => weather.byModel[model.key]?.temps || []);
      const minTemp = Math.floor(Math.min(...allTemps, 0) - 1);
      const maxTemp = Math.ceil(Math.max(...allTemps, 0) + 1);
      const tempRange = Math.max(1, maxTemp - minTemp);
      const maxRain = Math.max(2, ...weather.rain);

      const xForIndex = (i) => padding.left + (i / (times.length - 1)) * chartW;
      const yForTemp = (temp) => padding.top + ((maxTemp - temp) / tempRange) * tempZoneHeight;
      const yRainBase = padding.top + tempZoneHeight + 6 + rainZoneHeight;
      const yForRainTop = (value) => {
        const scaled = Math.pow((value || 0) / maxRain, 0.68);
        return yRainBase - scaled * rainZoneHeight;
      };

      state.chartMetrics = {
        rect,
        padding,
        times,
        xForIndex,
        yForTemp,
        yRainBase,
        minTemp,
        maxTemp,
        tempRange,
        chartW,
        maxRain,
      };

      ctx.save();
      ctx.strokeStyle = 'rgba(210, 192, 255, 0.10)';
      ctx.lineWidth = 1;
      for (let t = 0; t <= tempRange; t += 2) {
        const value = minTemp + t;
        const y = yForTemp(value);
        ctx.beginPath();
        ctx.moveTo(padding.left, y);
        ctx.lineTo(rect.width - padding.right, y);
        ctx.stroke();
      }

      for (let i = 0; i < times.length; i++) {
        const d = new Date(times[i]);
        const hour = d.getHours();
        const x = xForIndex(i);
        const isDayStart = hour === 0;
        const isSixHours = hour % 6 === 0;

        if (isSixHours || isDayStart) {
          ctx.strokeStyle = isDayStart ? 'rgba(210, 192, 255, 0.26)' : 'rgba(210, 192, 255, 0.13)';
          ctx.beginPath();
          ctx.moveTo(x, padding.top);
          ctx.lineTo(x, yRainBase);
          ctx.stroke();
        }
      }
      ctx.restore();

      ctx.save();
      weather.rain.forEach((value, i) => {
        const barWidth = Math.max(2, chartW / times.length - 1.5);
        const x = xForIndex(i) - barWidth / 2;
        const y = yForRainTop(value);
        const alpha = value >= 2 ? 0.86 : value >= 1 ? 0.68 : value >= 0.3 ? 0.48 : 0.34;
        ctx.fillStyle = `rgba(255,156,47,${alpha})`;
        ctx.fillRect(x, y, barWidth, Math.max(1, yRainBase - y));
      });
      ctx.restore();

      MODELS.forEach(model => {
        const series = weather.byModel[model.key]?.temps;
        if (!series) return;
        ctx.save();
        ctx.strokeStyle = model.color;
        ctx.globalAlpha = 0.82;
        ctx.lineWidth = 2.2;
        ctx.beginPath();
        series.forEach((temp, i) => {
          const x = xForIndex(i);
          const y = yForTemp(temp);
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        });
        ctx.stroke();
        ctx.restore();
      });
      
      const nowIndex = 0;
      if (times.length > 0) {
        const x = xForIndex(nowIndex);
        ctx.save();
        ctx.strokeStyle = 'rgba(246,184,140,0.95)';
        ctx.lineWidth = 1.5;
        ctx.setLineDash([5, 4]);
        ctx.beginPath();
        ctx.moveTo(x, padding.top);
        ctx.lineTo(x, yRainBase);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.restore();

        MODELS.forEach(model => {
          const value = weather.byModel[model.key]?.temps?.[nowIndex];
          if (value == null) return;
          const y = yForTemp(value);
          ctx.save();
          ctx.fillStyle = model.color;
          ctx.beginPath();
          ctx.arc(x, y, 4, 0, Math.PI * 2);
          ctx.fill();
          ctx.lineWidth = 1.5;
          ctx.strokeStyle = 'rgba(0,0,0,0.65)';
          ctx.stroke();
          ctx.restore();
        });
      }

      if (state.chartHoverIndex != null) {
        const i = state.chartHoverIndex;
        const x = xForIndex(i);

        ctx.save();
        ctx.strokeStyle = 'rgba(157,151,245,0.95)';
        ctx.lineWidth = 1.2;
        ctx.beginPath();
        ctx.moveTo(x, padding.top);
        ctx.lineTo(x, yRainBase);
        ctx.stroke();
        ctx.restore();

        MODELS.forEach(model => {
          const value = weather.byModel[model.key]?.temps?.[i];
          if (value == null) return;
          const y = yForTemp(value);
          ctx.save();
          ctx.fillStyle = model.color;
          ctx.beginPath();
          ctx.arc(x, y, 4.5, 0, Math.PI * 2);
          ctx.fill();
          ctx.lineWidth = 1.5;
          ctx.strokeStyle = 'rgba(255,255,255,0.22)';
          ctx.stroke();
          ctx.restore();
        });
      }

      ctx.save();
      ctx.font = '12px Oswald';
      ctx.fillStyle = 'rgba(243,212,191,0.85)';
      ctx.textAlign = 'right';
      for (let value = minTemp; value <= maxTemp; value += 4) {
        const y = yForTemp(value);
        ctx.fillText(`${value}°`, padding.left - 6, y + 4);
      }

      ctx.textAlign = 'center';
      ctx.font = '10px Oswald';
      for (let i = 0; i < times.length; i++) {
        const d = new Date(times[i]);
        const hour = d.getHours();
        if (hour % 6 === 0) {
          const x = xForIndex(i);
          ctx.fillStyle = hour === 0 ? 'rgba(157,151,245,0.95)' : 'rgba(243,212,191,0.82)';
          ctx.fillText(`${String(hour).padStart(2, '0')}:00`, x, rect.height - 16);

          if (hour === 0) {
            ctx.fillStyle = 'rgba(246,184,140,0.95)';
            ctx.fillText(formatDayDate(d), x + 24, padding.top - 8);
          }
        }
      }
      ctx.restore();
    }

function getDayLabel(date, index) {
  if (index === 0) return 'HEUTE';
  if (index === 1) return 'MORGEN';
  return date.toLocaleDateString('de-DE', { weekday: 'short' }).replace('.', '').toUpperCase();
}

function getDailyWeatherCode(codes) {
  if (!codes.length) return 3;
  const middayIndex = Math.min(codes.length - 1, 12);
  return codes[middayIndex];
}

function renderDailySummary(weather) {
  if (!els.dailySummary) return;
  if (!weather || !weather.times || !weather.temps || !weather.weatherCodes) {
    els.dailySummary.innerHTML = '';
    return;
  }

  const groups = new Map();

  weather.times.forEach((time, i) => {
    const d = new Date(time);
    const key = `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;

    if (!groups.has(key)) {
      groups.set(key, {
        date: d,
        temps: [],
        rain: [],
        codes: []
      });
    }

    const entry = groups.get(key);
    entry.temps.push(weather.temps[i]);
    entry.rain.push(weather.rain[i]);
    entry.codes.push(weather.weatherCodes[i]);
  });

  const days = [...groups.values()].slice(0, 4);

  els.dailySummary.innerHTML = days.map((day, index) => {
let min, max;

if (index === 0 && weather.dailyMin?.length) {
  // HEUTE → kompletter Tageswert
  min = Math.round(weather.dailyMin[0]);
  max = Math.round(weather.dailyMax[0]);
} else {
  // Rest wie bisher
  min = Math.round(Math.min(...day.temps));
  max = Math.round(Math.max(...day.temps));
}
let min, max, rain;

if (index === 0 && weather.dailyMin?.length) {
  min = Math.round(weather.dailyMin[0]);
  max = Math.round(weather.dailyMax[0]);
  rain = weather.dailyRain?.length ? weather.dailyRain[0] : day.rain.reduce((sum, v) => sum + (v || 0), 0);
} else {
  min = Math.round(Math.min(...day.temps));
  max = Math.round(Math.max(...day.temps));
  rain = day.rain.reduce((sum, v) => sum + (v || 0), 0);
}

    return `
      <div class="daily-card">
        <div class="daily-day">${getDayLabel(day.date, index)}</div>
        ${weatherIconSvg(code)}
        <div class="daily-temp">${min}° / ${max}°</div>
        <div class="daily-rain">${rain.toFixed(1)} MM</div>
      </div>
    `;
  }).join('');
}

    function updateStatusLabel() {

    function initMap() {
      state.map = L.map('map', {
        zoomControl: false,
        attributionControl: false,
        preferCanvas: true
      });

      state.baseLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {

      }).addTo(state.map);

    async function updateRadar() {
      if (!state.map || !state.location) return;

      state.map.setView([state.location.latitude, state.location.longitude], 7, { animate: false });

      try {
        const response = await fetch('https://api.rainviewer.com/public/weather-maps.json', { cache: 'no-store' });
        if (!response.ok) throw new Error('Radar-Metadaten fehlgeschlagen');

        const data = await response.json();
        const latest = data.radar?.past?.at(-1) || data.radar?.nowcast?.[0];
        if (!latest) throw new Error('Kein Radarbild verfügbar');

        const tileUrl = `https://tilecache.rainviewer.com${latest.path}/256/{z}/{x}/{y}/2/1_1.png`;

        if (state.radarLayer) state.map.removeLayer(state.radarLayer);

        state.radarLayer = L.tileLayer(tileUrl, {
          tileSize: 256,
          opacity: 0.65,
          zIndex: 10,
          minZoom: 0,
          maxZoom: 19,
          maxNativeZoom: 10,
          updateWhenZooming: false,
          keepBuffer: 4,
          crossOrigin: true
        }).addTo(state.map);

        state.radarTimestamp = latest.time * 1000;
        persistRadarMeta(state.radarTimestamp);
        els.radarTime.textContent = `RADAR ${formatTime(state.radarTimestamp)}`;
      } catch (error) {
        console.error(error);
        els.radarTime.textContent = `RADAR ${state.radarTimestamp ? formatTime(state.radarTimestamp) : '--:--'}`;
        toast('Radar konnte nicht aktualisiert werden');
      }
    }

    async function refreshWeather(focusMap = false) {
      if (!state.location) return;

      try {
        if (!navigator.onLine && state.weather) {
          state.isOffline = true;
          updateSummary(state.weather);
          toast('Zeige zwischengespeicherte Daten');
          await updateRadar();
          return;
        }

        setStatus('AKTUALISIERE');
        const weather = await fetchWeatherForLocation(state.location);
        state.weather = weather;
        state.lastUpdate = Date.now();
        state.isOffline = false;

        persistCache();
        updateSummary(weather);
        await updateFavoriteTemperatures();
        await updateRadar();
        scheduleRelayout();

        if (focusMap && state.map) {
          state.map.setView([state.location.latitude, state.location.longitude], 7, { animate: false });
        }
      } catch (error) {
        console.error(error);
        const message = error && error.message ? error.message : 'Unbekannter Fehler';
        state.isOffline = !navigator.onLine;
        updateStatusLabel();
        els.footerLeft.innerHTML = `FEHLER <strong>${message.replace(/</g, '&lt;').replace(/>/g, '&gt;').slice(0, 80)}</strong>`;

        if (state.weather) {
          updateSummary(state.weather);
          toast(`Fehler: ${message}`);
        } else {
          toast(`Fehler: ${message}`);
        }
      }
    }

    async function initializeLocation() {
      if (state.location) return;

      const detected = await detectLocation();
      if (detected) {
        const named = await reverseGeocode(detected.latitude, detected.longitude);
        state.location = named || detected;
        persistCurrentLocation();
        return;
      }

      state.location = state.favorites[0];
      persistCurrentLocation();
    }

function wait(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

function wait(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}

async function closeSearchAndStabilizeViewport() {
  try {
    els.searchInput.blur();
  } catch {}

  els.searchDialog.close();

  await wait(50);
  updateAppHeight();

  await wait(150);
  updateAppHeight();

  await wait(300);
  updateAppHeight();

  await wait(600);
  updateAppHeight();

  scheduleRelayout();
}  

    function setupSearch() {

		els.searchDialog.addEventListener('close', () => {
  scheduleRelayout();
});
  els.openSearchButton.addEventListener('click', () => {
    els.searchDialog.showModal();
    setTimeout(() => els.searchInput.focus(), 50);
  });

  els.closeSearchButton.addEventListener('click', () => els.searchDialog.close());
els.useCurrentLocationButton.addEventListener('click', async () => {
  const detected = await detectLocation();
  if (detected) {
    const named = await reverseGeocode(detected.latitude, detected.longitude);
    state.location = named || detected;
    persistCurrentLocation();

    await closeSearchAndStabilizeViewport();
    await refreshWeather(true);
    scheduleRelayout();
  } else {
    toast('Aktueller Ort nicht verfügbar');
  }
});

  els.searchForm.addEventListener('submit', async (event) => {
    event.preventDefault();
    const q = els.searchInput.value.trim();
    if (!q) return;

    els.searchResults.innerHTML = '<button type="button">SUCHE LÄUFT...</button>';

    try {
      const results = await geocodeLocation(q);
      els.searchResults.innerHTML = '';

      if (!results.length) {
        els.searchResults.innerHTML = '<button type="button">KEINE TREFFER</button>';
        return;
      }

      results.forEach(result => {
        const button = document.createElement('button');
        button.type = 'button';
        button.textContent = result.name;

        button.addEventListener('click', async () => {
  state.location = result;
  persistCurrentLocation();

  const exists = state.favorites.some(f => f.name === result.name);
  if (!exists) {
    state.favorites = [result, ...state.favorites].slice(0, 4);
    persistFavorites();
  }

  await closeSearchAndStabilizeViewport();
  await refreshWeather(true);
  scheduleRelayout();
});

        els.searchResults.appendChild(button);
      });
    } catch {
      els.searchResults.innerHTML = '<button type="button">SUCHE FEHLGESCHLAGEN</button>';
    }
  });
}

    function getChartIndexFromEvent(event) {
      if (!state.chartMetrics || !state.weather) return null;

      const rect = els.forecastCanvas.getBoundingClientRect();
      const clientX = event.touches?.[0]?.clientX ?? event.clientX;
      const x = clientX - rect.left;
      const { padding, chartW, times } = state.chartMetrics;

      if (x < padding.left || x > rect.width - padding.right) return null;

      const ratio = (x - padding.left) / chartW;
      return Math.max(0, Math.min(times.length - 1, Math.round(ratio * (times.length - 1))));
    }

    function showChartTooltip(index, event) {
      if (!state.weather || index == null) return;

      const time = state.weather.times[index];
      const rain = state.weather.rain[index] ?? 0;

      const rows = MODELS
        .map(model => {
          const value = state.weather.byModel[model.key]?.temps?.[index];
          if (value == null) return '';
          return `<div class="tt-row"><span class="tt-label"><span class="tt-dot" style="background:${model.color}"></span>${model.label}</span><strong>${Math.round(value)}°</strong></div>`;
        })
        .join('');

      els.chartTooltip.innerHTML = `
        <div class="tt-time">${formatDayDate(time)} ${formatTime(time)}</div>
        ${rows}
        <div class="tt-row"><span class="tt-label">Regen</span><strong>${rain.toFixed(1)} mm</strong></div>
      `;

      els.chartTooltip.hidden = false;

      const wrapRect = els.forecastCanvas.parentElement.getBoundingClientRect();
      const pointX = (event.touches?.[0]?.clientX ?? event.clientX) - wrapRect.left;
      const tooltipWidth = 156;
      const left = Math.max(8, Math.min(wrapRect.width - tooltipWidth - 8, pointX - tooltipWidth / 2));

      els.chartTooltip.style.left = `${left}px`;
      els.chartTooltip.style.top = '8px';
    }

    function hideChartTooltip() {
      els.chartTooltip.hidden = true;
      state.chartHoverIndex = null;
    }

    function setupChartInteractions() {
      const wrap = els.forecastCanvas.parentElement;

      const onMove = (event) => {
        if (!state.weather) return;

        const index = getChartIndexFromEvent(event);
        if (index == null) {
          hideChartTooltip();
          drawForecastChart(state.weather);
          return;
        }

        state.chartHoverIndex = index;
        drawForecastChart(state.weather);
        showChartTooltip(index, event);
      };

      wrap.addEventListener('pointermove', onMove);
      wrap.addEventListener('pointerdown', onMove);
      wrap.addEventListener('pointerleave', () => {
        if (!state.weather) return;
        hideChartTooltip();
        drawForecastChart(state.weather);
      });

      wrap.addEventListener('touchstart', onMove, { passive: true });
      wrap.addEventListener('touchmove', onMove, { passive: true });
      wrap.addEventListener('touchend', () => {
        if (!state.weather) return;
        setTimeout(() => {
          hideChartTooltip();
          drawForecastChart(state.weather);
        }, 1200);
      });
    }

function setupNetworkEvents() {
  window.addEventListener('online', async () => {
    state.isOffline = false;
    updateStatusLabel();
    toast('Wieder online');
    await refreshWeather();
  });

  window.addEventListener('offline', () => {
    state.isOffline = true;
    updateStatusLabel();
    toast('Offline');
  });

  window.addEventListener('resize', () => {
    relayoutApp();
  });

  window.addEventListener('orientationchange', () => {
    updateAppHeight(true);
    setTimeout(() => updateAppHeight(true), 100);
    setTimeout(relayoutApp, 150);
    setTimeout(relayoutApp, 350);
  });

  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', () => {
      relayoutApp();
    });
  }
}

    async function registerServiceWorker() {
      if (!('serviceWorker' in navigator)) return;

      const swCode = `
        const CACHE_NAME = 'lcars-weather-static-v1';
        self.addEventListener('install', event => {
          event.waitUntil(caches.open(CACHE_NAME).then(cache => cache.addAll(['./', 'IMG_7958.png'])));
          self.skipWaiting();
        });
        self.addEventListener('activate', event => {
          event.waitUntil(self.clients.claim());
        });
        self.addEventListener('fetch', event => {
          const request = event.request;
          if (request.method !== 'GET') return;
          event.respondWith(
            fetch(request).then(response => {
              const copy = response.clone();
              caches.open(CACHE_NAME).then(cache => cache.put(request, copy)).catch(() => {});
              return response;
            }).catch(() => caches.match(request).then(match => match || caches.match('./')))
          );
        });
      `;

      const blob = new Blob([swCode], { type: 'text/javascript' });
      const url = URL.createObjectURL(blob);

      try {
        await navigator.serviceWorker.register(url);
      } catch {}
    }

let maxAppHeight = 0;
let lastOrientation = '';

function getOrientationKey() {
  return window.innerWidth > window.innerHeight ? 'landscape' : 'portrait';
}

function getViewportHeight() {
  return Math.round(
    window.visualViewport ? window.visualViewport.height : window.innerHeight
  );
}

function updateAppHeight(forceReset = false) {
  const orientation = getOrientationKey();
  const vh = getViewportHeight();

  if (forceReset || orientation !== lastOrientation) {
    lastOrientation = orientation;
    maxAppHeight = vh;
  } else {
    maxAppHeight = Math.max(maxAppHeight, vh);
  }

  document.documentElement.style.setProperty('--app-height', `${maxAppHeight}px`);
}

function relayoutApp() {
  updateAppHeight();
  renderFavorites();

  if (state.weather) {
    drawForecastChart(state.weather);
  }

  if (state.map) {
    state.map.invalidateSize();
  }
}

function scheduleRelayout() {
  requestAnimationFrame(relayoutApp);
  setTimeout(relayoutApp, 80);
  setTimeout(relayoutApp, 220);
  setTimeout(relayoutApp, 500);
  setTimeout(relayoutApp, 900);
}

  installDynamicManifest();
  updateAppHeight();
  loadStoredData();
  updateClock();

  setupSearch();
  setupNetworkEvents();
  setupChartInteractions();

	els.refreshButton.addEventListener('click', async () => {

});

  initMap();
  renderFavorites();

  await initializeLocation();
  await refreshWeather(true);

  requestAnimationFrame(relayoutApp);
  setTimeout(relayoutApp, 100);
  setTimeout(relayoutApp, 400);

  registerServiceWorker();
}
